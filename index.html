<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Road to the Candy House • Absorption Costing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
      color: #333;
      line-height: 1.35;
      font-size: 15px;
    }
    .header { text-align: center; padding: 15px 10px; background: #ff6b6b; color: white; font-size: 1.65rem; text-shadow: 2px 2px 0 #c44545; }
    .intro { text-align: center; padding: 25px 15px; background: white; margin: 12px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
    .progress-list { text-align: left; max-width: 360px; margin: 20px auto; font-size: 1.05rem; }
    .progress-item {
      padding: 10px 12px; margin: 6px 0; background: #f8f9fa; border-radius: 10px; cursor: pointer;
    }
    .progress-item:hover { background: #e3f2fd; }
    .progress-item.completed { background: #e8f5e9; color: #4caf50; font-weight: 600; text-decoration: line-through; }
    .road-container { max-width: 1000px; margin: 15px auto; padding: 8px 12px; }
    .section {
      background: white; margin: 12px; padding: 18px 15px; border-radius: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1); scroll-margin-top: 80px;
    }
    .formula { font-size: 1.15rem; padding: 16px; background: #f8f9fa; border-radius: 12px; border: 3px solid #ffcc00; line-height: 2.1; margin: 12px 0; text-align: center; }
    .drop-zone { 
      display: inline-block; min-width: 140px; padding: 12px 16px; margin: 6px; 
      background: #fff; border: 3px dashed #ff6b6b; border-radius: 12px; 
      font-weight: 600; min-height: 52px; font-size: 1.05rem; text-align: center;
    }
    .draggable { 
      display: inline-block; padding: 10px 18px; margin: 6px; 
      background: #ff6b6b; color: white; border-radius: 50px; cursor: grab; 
      font-weight: 600; font-size: 1.05rem; box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
    }
    .option { display: block; margin: 10px 0; padding: 12px; background: #f8f9fa; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; }
    .option:hover { background: #e3f2fd; }
    .explanation { display: none; background: #e3f2fd; padding: 12px; border-radius: 12px; border-left: 5px solid #2196f3; margin: 12px 0; font-size: 0.98rem; }
    .feedback { margin-top: 12px; font-size: 1.05rem; min-height: 100px; text-align: center; }
    .success { color: #4caf50; font-weight: 600; }
    .error { color: #f44336; }
    button {
      padding: 12px 22px; font-size: 1.05rem; background: #ff6b6b; color: white;
      border: none; border-radius: 50px; cursor: pointer; margin: 6px 4px; width: 48%;
    }
    button.reset-btn { background: #9e9e9e; }
    button.next-btn { background: #4caf50; margin-top: 10px; }
  </style>
</head>
<body>
  <!-- (All HTML content is the same as before - omitted for brevity) -->
  <!-- Full HTML sections 1 to 11 are identical to the previous complete version -->

  <script>
    function allowDrop(ev) { 
      ev.preventDefault(); 
    }

    function drag(ev) { 
      ev.dataTransfer.setData("text", ev.target.id); 
    }

    // ==================== FIXED DROP FUNCTION ====================
    function drop(ev) {
      ev.preventDefault();
      const data = ev.dataTransfer.getData("text");
      
      if (!data) return; // Safety: no data

      const original = document.getElementById(data);
      if (!original) {
        console.warn("Drag item not found:", data);
        return;
      }

      const clone = original.cloneNode(true);
      clone.id = "cloned_" + Date.now();   // Unique ID
      clone.draggable = true;
      clone.ondragstart = drag;

      // Clear previous content if needed (prevents multiple drops)
      ev.target.innerHTML = "";
      ev.target.appendChild(clone);
      ev.target.classList.add("filled");
    }

    // Rest of your script (selected, functions, checkStep1, checkStep2, etc.)
    let selected = {5:"",6:"",7:"",8:"",9:"",10:""};

    function selectOption(el, q) {
      document.querySelectorAll(`input[name="q${q}"]`).forEach(r => r.parentElement.style.borderColor = "#ddd");
      el.style.borderColor = "#ff6b6b";
      selected[q] = el.querySelector('input').value;
    }

    function goToFront() { document.getElementById('intro').scrollIntoView({ behavior: 'smooth' }); }
    function goToStep(step) {
      const element = document.getElementById('section' + step);
      if (element) element.scrollIntoView({ behavior: 'smooth' });
    }
    function markCompleted(step) {
      const el = document.getElementById('p' + step);
      if (el) el.classList.add("completed");
      const nextBtn = document.getElementById('nextBtn' + step);
      if (nextBtn) nextBtn.style.display = "inline-block";
    }
    function celebrate() {
      const emojis = ["🍭","🍬","🍫","🌈","🍒","🏆"];
      for (let i = 0; i < 35; i++) {
        setTimeout(() => {
          const candy = document.createElement("div");
          candy.textContent = emojis[Math.floor(Math.random()*emojis.length)];
          candy.style.position = "fixed";
          candy.style.left = Math.random() * 100 + "vw";
          candy.style.top = "-50px";
          candy.style.fontSize = "2rem";
          candy.style.transition = "all 3.5s linear";
          document.body.appendChild(candy);
          setTimeout(() => { 
            candy.style.top = "110vh"; 
            candy.style.transform = `rotate(${Math.random()*800}deg)`; 
          }, 100);
          setTimeout(() => candy.remove(), 4000);
        }, i * 50);
      }
    }

    // Check functions (same as previous version with your explanations)
    function checkStep1() {
      const num = document.getElementById("numerator").textContent.trim();
      const den = document.getElementById("denominator").textContent.trim();
      const fb = document.getElementById("feedback1");
      if (num.includes("Budgeted") && den.includes("Budgeted")) {
        fb.innerHTML = `<span class="success">🎉 Excellent! Step 1 Correct!</span>`;
        celebrate(); markCompleted(1);
      } else {
        fb.innerHTML = `<span class="error">❌ Wrong choice!<br><strong>Predetermined OAR is calculated at the beginning of the period, so budgeted figures are used.</strong></span>`;
      }
    }

    function checkStep2() {
      const zone = document.getElementById("dropzone2").textContent.trim();
      const fb = document.getElementById("feedback2");
      const exp = document.getElementById("explanation2");
      if (zone.includes("Actual")) {
        fb.innerHTML = `<span class="success">🎉 Correct! Well done!</span>`;
        exp.style.display = "none";
        celebrate(); markCompleted(2);
      } else {
        fb.innerHTML = `<span class="error">❌ Not quite right.</span>`;
        exp.innerHTML = `<strong>Why do we use Actual quantity?</strong><br>We use Actual quantity because "Overheads Absorbed" tells us how much overhead has been charged (absorbed) into the products that were actually produced during the period.`;
        exp.style.display = "block";
      }
    }

    // ... (Include all other checkStep3() to checkStep11() and reset functions from previous complete code) ...

    // Reset functions (updated for step 2)
    function resetStep1() { 
      document.getElementById("feedback1").innerHTML = ""; 
      document.getElementById("numerator").innerHTML = ""; 
      document.getElementById("denominator").innerHTML = ""; 
    }
    function resetStep2() { 
      document.getElementById("feedback2").innerHTML = ""; 
      document.getElementById("dropzone2").innerHTML = ""; 
      document.getElementById("explanation2").style.display = "none"; 
    }
  </script>
</body>
</html>
